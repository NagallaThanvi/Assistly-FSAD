spring.application.name=assistly

# MySQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/assistly_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Suhas@0000}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Secret
jwt.secret=${JWT_SECRET:your_super_secret_key_which_must_be_long_enough_for_hmac_sha256}
jwt.expirationMs=86400000

# Server
server.port=8080

# Google OAuth2
google.client.id=${GOOGLE_CLIENT_ID:}
