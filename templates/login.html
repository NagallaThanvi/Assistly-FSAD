{% extends 'base.html' %}
{% block title %}Assistly | Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card auth-card">
            <div class="card-body p-4">
                <h3 class="mb-1">Welcome back</h3>
                <p class="text-secondary mb-4">Sign in to manage requests, collaborate with volunteers, and track progress.</p>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" autocomplete="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" autocomplete="current-password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <div class="d-flex align-items-center gap-2 my-3">
                    <hr class="flex-grow-1 my-0">
                    <span class="small text-secondary">or</span>
                    <hr class="flex-grow-1 my-0">
                </div>
                <a href="{{ url_for('auth.login_google') }}" class="btn btn-outline-light w-100">
                    <i class="bi bi-google me-2"></i>Continue with Google
                </a>
                <div class="small text-secondary mt-3 text-center">New here? <a href="{{ url_for('auth.signup') }}">Create an account</a></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
