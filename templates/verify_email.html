{% extends 'base.html' %}
{% block title %}Assistly | Verify Email{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card auth-card">
            <div class="card-body p-4">
                <h3 class="mb-1">Verify your email</h3>
                <p class="text-secondary mb-4">Enter the 6-digit code sent to <strong>{{ email }}</strong>.</p>
                <form method="post" action="{{ url_for('auth.verify_email') }}">
                    <input type="hidden" name="email" value="{{ email }}">
                    <div class="mb-3">
                        <label class="form-label">Verification code</label>
                        <input
                            type="text"
                            name="otp"
                            class="form-control"
                            pattern="[0-9]{6}"
                            maxlength="6"
                            minlength="6"
                            placeholder="Enter 6-digit code"
                            required
                        >
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Verify and Create Account</button>
                </form>
                <div class="small text-secondary mt-3 text-center">Wrong email? <a href="{{ url_for('auth.signup') }}">Go back to signup</a></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
