{% extends 'base.html' %}
{% block title %}Assistly | Create Request{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-9">
        <div class="card">
            <div class="card-body">
                <h3 class="card-title mb-3">Create Help Request</h3>
                <p class="text-secondary">Share enough detail so volunteers can respond quickly and accurately.</p>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-select" required>
                                {% for category in ['Medical', 'Grocery', 'Transportation', 'Emergency', 'Elderly Support'] %}
                                <option value="{{ category }}" {% if prefill.category == category %}selected{% endif %}>{{ category }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Urgency</label>
                            <select name="urgency" class="form-select" required>
                                {% for urgency in ['Low', 'Medium', 'High', 'Critical'] %}
                                <option value="{{ urgency }}" {% if prefill.urgency == urgency %}selected{% endif %}>{{ urgency }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row g-3 mt-1">
                        <div class="col-md-6">
                            <label class="form-label">Community</label>
                            <select name="community" class="form-select">
                                {% for community in communities %}
                                <option value="{{ community.name }}">{{ community.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" id="isEmergency" name="is_emergency" value="1" {% if prefill.is_emergency %}checked{% endif %}>
                                <label class="form-check-label" for="isEmergency">Mark as emergency request</label>
                            </div>
                        </div>
                    </div>
                    <div class="mt-3 mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" name="location" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success">Submit Request</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
