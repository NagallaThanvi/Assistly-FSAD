{% extends 'base.html' %}
{% block title %}Assistly | Signup{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="card auth-card">
            <div class="card-body p-4">
                <h3 class="mb-1">Create your Assistly account</h3>
                <p class="text-secondary mb-4">Start posting requests, volunteering, and connecting with nearby communities.</p>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" autocomplete="name" placeholder="Your full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" autocomplete="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" autocomplete="new-password" minlength="6" placeholder="At least 6 characters" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Admin code (optional)</label>
                        <input type="text" name="admin_code" class="form-control" placeholder="Use only for admin creation">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Create Account</button>
                </form>
                <div class="small text-secondary mt-3 text-center">Already registered? <a href="{{ url_for('auth.login') }}">Log in instead</a></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
