<div class="d-flex flex-column gap-2">
    <a class="sidebar-link {% if request.endpoint == 'request_routes.dashboard' %}active{% endif %}" href="{{ url_for('request_routes.dashboard') }}"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
    {% if can_create_requests %}
    <a class="sidebar-link {% if request.endpoint == 'request_routes.create_request_page' %}active{% endif %}" href="{{ url_for('request_routes.create_request_page') }}"><i class="bi bi-plus-circle-fill"></i><span>Create Request</span></a>
    {% endif %}
    {% if can_accept_tasks %}
    <a class="sidebar-link {% if request.endpoint == 'request_routes.volunteer_dashboard' %}active{% endif %}" href="{{ url_for('request_routes.volunteer_dashboard') }}"><i class="bi bi-person-workspace"></i><span>Volunteer Mode</span></a>
    <a class="sidebar-link {% if request.endpoint == 'request_routes.browse_requests_page' %}active{% endif %}" href="{{ url_for('request_routes.browse_requests_page') }}"><i class="bi bi-search-heart-fill"></i><span>Browse Requests</span></a>
    {% endif %}
    <a class="sidebar-link {% if request.endpoint == 'request_routes.communities_page' %}active{% endif %}" href="{{ url_for('request_routes.communities_page') }}"><i class="bi bi-people-fill"></i><span>Communities</span></a>
    <a class="sidebar-link {% if request.endpoint == 'request_routes.community_map_page' %}active{% endif %}" href="{{ url_for('request_routes.community_map_page') }}"><i class="bi bi-map-fill"></i><span>Community Map</span></a>
    <a class="sidebar-link {% if request.endpoint == 'request_routes.profile_page' %}active{% endif %}" href="{{ url_for('request_routes.profile_page') }}"><i class="bi bi-person-badge-fill"></i><span>Profile</span></a>
</div>
